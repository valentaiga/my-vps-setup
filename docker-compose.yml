
name: vps-setup

services:
  # https://github.com/GetPageSpeed/MTProxy
  MTProxy:
    container_name: MTProxy
    image: ghcr.io/getpagespeed/mtproxy
    ports:
      - "8443:8443"
    privileged: true
    environment:
      - SECRET
      - EXTERNAL_IP
      - DIRECT_MODE=true
      - PORT=8443
      - STATS_PORT=8888
      - WORKERS=1
      - RANDOM_PADDING=true
    volumes:
      - ~/vps-setup-data/mtproxy-data:/opt/mtproxy/data:rw

  # https://github.com/hwdsl2/docker-ipsec-vpn-server
  ipsec-vpn:
    container_name: ipsec-vpn
    image: hwdsl2/ipsec-vpn-server
    ports:
      - "500:500/udp"
      - "4500:4500/udp"
    privileged: true
    environment:
      - VPN_IPSEC_PSK
      - VPN_USER
      - VPN_PASSWORD
    volumes:
      - ~/vps-setup-data/ipsec-vpn/data:/etc/ipsec.d:rw
      - ~/vps-setup-data/ipsec-vpn/modules:/lib/modules:ro
